<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Ivan Chijindu">
        <meta name="description" content="Myfirst web page">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <link rel="icon" href="./assets/media/favicon.png" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Jobber | | Login</title>
        <link rel="stylesheet" href="./assets/styles/index.css" media="all">
        <script src="./assets/scripts/login.js" defer></script>
    </head>
    <body>
        <header>
            <div class="mid-header">
                <h2>Jobber</h2>
            </div>
        </header>

        <main>
            <div class="login-container">

                <!-- LEFT SIDE -->
                <section class="welcome-section">
                    <h1>Welcome Back</h1>
                    <p>
                        Connect with professionals, discover opportunities,
                        and grow your network with Jobber.
                    </p>
                    <img src="./assets/media/networking-icon.jpg" alt="Networking Illustration" class="login-image">
                </section>

                <!-- RIGHT SIDE -->
                <section class="form-section">
                    <div class="form-card">
                        <h2>Login</h2>
                        <form id="loginForm">
                            <div class="input-box">
                                <label>Email</label>
                                <input type="email" id="email" placeholder="Enter email">
                            </div>

                            <div class="input-box">
                                <label>Password</label>
                                <input type="password" id="password" placeholder="Enter password" required>
                            </div>

                            <p id="error-message"></p>

                            <button type="submit" class="login-btn">Login</button>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </body>
</html>
